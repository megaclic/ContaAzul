        saldo:
          description: Saldo do produto na variação
          type: number
          example: 100
        status:
          description: Status do produto na variação
          allOf:
            - $ref: '#/components/schemas/StatusDoProduto'
          example: ATIVO
        tipo:
          description: Tipo do produto na variação
          allOf:
            - $ref: '#/components/schemas/TipoDoProdutoResumo'
          example: PRODUTO
        valor_venda:
          description: Valor de venda do produto na variação
