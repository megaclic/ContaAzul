    Produto:
      description: >-
        Modelo de resposta para o produto contendo todas as informações
        necessárias
      type: object
      properties:
        ativo:
          description: Indica se o produto está ativo
          type: boolean
          example: true
        categoria:
          description: Grupo ou categoria do produto
          allOf:
            - $ref: '#/components/schemas/CategoriaDoProduto'
        codigo_ean:
          description: Código de barras do produto
          type: string
          example: EAN123
        codigo_sku:
          description: Código interno do produto
          type: string
          example: SKU123
        conversao_unidade_medida:
          description: Conversões de unidade de medida do produto
          type: array
          items:
            $ref: '#/components/schemas/ConversaoDeUnidadeDeMedidaDoProduto'
        descricao:
          description: Descrição detalhada do produto
          type: string
          example: Descrição do produto
        detalhe_kit:
          description: Detalhes do kit de produtos
          allOf:
            - $ref: '#/components/schemas/DetalheDoKitDeProdutos'
        ecommerce:
          description: Informações de e-commerce do produto
          allOf:
            - $ref: '#/components/schemas/EcommerceDoProduto'
        estoque:
          description: Informações de estoque do produto
          allOf:
            - $ref: '#/components/schemas/EstoqueDoProduto'
        fiscal:
          description: Informações fiscais do produto
          allOf:
            - $ref: '#/components/schemas/FiscalDoProduto'
        formato:
          description: Formato do produto
          allOf:
            - $ref: '#/components/schemas/FormatoDoProduto'
          example: SIMPLES
        id:
          description: ID do produto no sistema legado
          type: string
          example: 9aa9af47-a539-40fc-9005-85c70e757fcf
        id_centro_custo:
          description: ID do centro de custo associado ao produto
          type: string
          example: 9aa9af47-a539-40fc-9005-85c70e757fcf
        id_legado:
          description: ID do produto no sistema legado
          type: integer
          example: 78305
        imagens:
          description: Lista de imagens do produto
          type: array
          items:
            $ref: '#/components/schemas/ImagemDoProduto'
        nome:
          description: Nome do produto
          type: string
          example: nome do produto
        pesos_dimensoes:
          description: Dimensões e pesos do produto
          allOf:
            - $ref: '#/components/schemas/DimensoesDoProduto'
        status:
          description: Status atual do produto
          allOf:
            - $ref: '#/components/schemas/StatusDoProduto'
          example: ATIVO
        ultima_atualizacao:
          description: Data da última atualização do produto
          type: string
          example: '2025-07-22T17:47:35.825004839Z'
        unidade_medida:
          description: Unidade de medida fiscal do produto
          allOf:
            - $ref: '#/components/schemas/FiscalUnidadeDeMedidaDoProduto'
        variacao:
          description: Informações de variação do produto
          allOf:
            - $ref: '#/components/schemas/VariacaoDoProduto'
        versao:
          description: Versão do produto
          type: integer
          example: 1
    ProdutoEcommerceCategoria:
      description: Modelo de resposta para a lista de categorias de e-commerce
